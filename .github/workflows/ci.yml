name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Syntax check
        run: find src -name '*.js' -exec node --check {} \;

      - name: Smoke test
        env:
          MONGO_URI: mongodb://localhost:27017/shop
          PORT: 3001
          NODE_ENV: test
          CORS_ORIGIN: http://localhost:5173
        run: |
          node src/index.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3001/health && break
            sleep 1
          done
          curl -fsS "http://localhost:3001/api/products?limit=2" | grep -q '"data"'
          test "$(curl -s -o /dev/null -w '%{http_code}' 'http://localhost:3001/api/products?category=hack')" = "400"
          curl -fsS http://localhost:3001/api-docs.json | grep -q '"openapi"'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/api-docs/)" = "200"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build
